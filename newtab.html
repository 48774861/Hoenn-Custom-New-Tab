<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Littleroot Town</title>
  <link rel="icon" type="image/png" href="icons/may_bike.png">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/dock.css">
  <link rel="stylesheet" href="css/search.css">
  <link rel="stylesheet" href="css/clock.css">
  <link rel="stylesheet" href="css/weather.css">
  <link rel="stylesheet" href="css/notes.css">
  <link rel="stylesheet" href="css/effects.css">
  <link rel="stylesheet" href="css/misc.css">

  </style>
</head>

<body>

  <video autoplay muted loop id="bg-video">
    <source src="wallpaper.mp4" type="video/mp4">
  </video>

  <div id="top-dock">
    <div id="dock-left"><div id="forecast"></div></div>
    <div id="app-dock"></div>
    <div id="dock-right">
      <img src="icons/settings.png" id="settings-btn">
      <div id="clock"></div>
    </div>
  </div>

  <div id="search-container">
    <input id="search" placeholder="Searching the World of Pokémon!" />
  </div>

  <img id="corner-gif" src="gifs/dragonite_sleeping.gif" alt="corner gif">
  <!-- <script src="js/randomized_gif/setup.js" defer></script> -->
  
  <a href="https://www.reddit.com/r/pokemon/comments/1042opj/oc_pok%C3%A9mon_emerald_waterfall_new_aniamted/" class="artist-credit">@itzaspace</a>

  <script src="js/shared_functions/matter.min.js"></script>
  <script type="module" src="newtab.js"></script>

  <div id="notes-wrapper">
    <textarea id="quick-notes" placeholder="Quick notes..."></textarea>

    <button id="notes-bg-btn" title="Change Background"> </button>

    <input type="file" id="notes-bg-upload" accept="image/*" hidden />
  </div>
</body>
</html>
