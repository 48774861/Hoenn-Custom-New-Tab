<!DOCTYPE html>
<html>
<head>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      /* height: 100%; */
      width: 100vw;
      height: 100vh;
      background: black;
      overflow: hidden;
    }

    /* Hide Brave's gray bar */
    body > div:last-of-type,
    body > div:not(:first-child) {
      display: none !important;
    }

    #settings-btn {
      position: fixed;
      top: 15px;
      right: 15px;
      width: 32px;
      height: 32px;
      z-index: 10;

      cursor: pointer;
      opacity: 0.8;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    #settings-btn:hover {
      opacity: 1;
      transform: scale(1.1);
    }

    #settings-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    #settings-panel {
      background: #111;
      color: white;
      padding: 30px;
      border-radius: 12px;
      min-width: 300px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }

    .hidden {
      display: none !important;
    }

    #bg-video {
      position: fixed;
      top: 50%;
      left: 50%;
      min-width: 100%;
      min-height: 100%;
      transform: translate(-50%, -50%);
      object-fit: cover;
    }
  </style>
</head>

<body>
  <video autoplay muted loop id="bg-video">
    <source src="wallpaper.mp4" type="video/mp4">
  </video>

  <img src="settings.png" id="settings-btn">
  <script src="newtab.js"></script>

</body>
</html>
