<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Littleroot Town</title>
  <link rel="icon" type="image/png" href="icons/may_bike.png">

  <style>
    /* =========================
      🌍 BASE LAYOUT
    ========================= */

    html, body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: black;
    }

    /* =========================
      🎥 VIDEO BACKGROUND
    ========================= */

    #bg-video {
      position: fixed;
      top: 50%;
      left: 50%;
      min-width: 100%;
      min-height: 100%;
      transform: translate(-50%, -50%);
      object-fit: cover;
    }

    /* =========================
      🧭 TOP DOCK LAYOUT
    ========================= */

    #top-dock {
      position: fixed;
      /* top: 5px; */
      padding-top: 6px;
      left: 0;
      right: 0;
      z-index: 9999;

      display: flex;
      align-items: center;
    }

    #dock-left {
      flex: 1;
    }

    #dock-right {
      flex: 1;
      display: flex;
      flex-direction: column;   /* 👈 stack vertically */
      align-items: flex-end;    /* 👈 keep right aligned */
      padding-right: 10px;
      gap: 6px;
    }

    /* =========================
      📌 BOOKMARK BAR
    ========================= */

    #app-dock {
      display: flex;
      align-items: center;
      gap: 8px;

      padding: 6px 8px;
      border-radius: 10px;

      pointer-events: auto;

      background: rgba(0, 40, 20, 0.08);
      backdrop-filter: blur(1px);

      border: 1px solid rgba(255, 255, 255, 0.04);
    }

    #app-dock img {
      width: 26px;
      height: 26px;
      cursor: pointer;

      transition: transform 0.15s ease, filter 0.2s ease, opacity 0.2s ease;

      filter: brightness(0.55) saturate(0.4) sepia(0.6) hue-rotate(90deg);
      opacity: 0.85;
    }

    #app-dock img:hover {
      filter: none;
      opacity: 1;
      transform: scale(1.15);
    }

    /* =========================
      ⚙️ SETTINGS BUTTON
    ========================= */

    #settings-btn {
      width: 26px;
      height: 26px;
      cursor: pointer;

      display: block;

      /* match bookmark icons exactly */
      filter:
        brightness(0.55)
        saturate(0.4)
        sepia(0.6)
        hue-rotate(90deg);

      opacity: 0.85;

      transition: transform 0.15s ease,
                  filter 0.2s ease,
                  opacity 0.2s ease;
    }

    #settings-btn:hover {
      filter: none;
      opacity: 1;
      transform: scale(1.15);
    }

    /* =========================
      🔍 SEARCH POSITION
    ========================= */

    #search-container {
      position: fixed;
      top: 50%;
      left: 49%;
      transform: translate(-50%, -50%);
      z-index: 9999;
    }

    /* =========================
      🪵 WOODEN SIGN SEARCH BAR
      (3D WORLD SPACE OBJECT)
    ========================= */

    @font-face {
      font-family: "PixelFont";
      src: url("fonts/Realwood-Regular.otf") format("truetype");
    }

    @font-face {
      font-family: "LeafFont";
      src: url("fonts/Themunday.ttf") format("truetype");
    }

    #search {
      width: 450px;
      height: 38px;

      padding: 8px 12px;

      font-family: "PixelFont", monospace;
      font-size: 18px;
      text-align: center;

      color: #edd8ac;

      background: url("icons/wood-texture.png");
      background-size: cover;

      border: 3px solid #292b1f;
      border-radius: 0;

      outline: none;

      box-shadow:
        inset 0 2px 4px rgba(0,0,0,0.35),
        0 4px 10px rgba(0,0,0,0.4);

      text-shadow:
        0 1px 0 rgba(0, 0, 0, 0.5),
        0 -1px 0 rgba(255, 255, 255, 0.1);

      /* 🌲 BASE 3D SIGN POSITION */
      transform: perspective(600px) rotateY(-10deg) skewY(-12deg);
      transform-origin: center;
    }

    /* =========================
      ✏️ PLACEHOLDER TEXT
    ========================= */

    #search::placeholder {
      color: rgba(230, 211, 179, 0.6);
      text-align: center;
    }

    /* =========================
      🌬️ WIGGLE ANIMATION
      (ALIGNED TO 3D SIGN)
    ========================= */

    /* =========================
      🌬️ SOFT WIGGLE (barely moving)
    ========================= */
    @keyframes wiggleSoft {
      0% {
        transform: perspective(600px) rotateY(-10deg) skewY(-12deg) rotateZ(-3.8deg);
      }
      50% {
        transform: perspective(600px) rotateY(-10deg) skewY(-12deg) rotateZ(-4.2deg);
      }
      100% {
        transform: perspective(600px) rotateY(-10deg) skewY(-12deg) rotateZ(-3.8deg);
      }
    }

    /* =========================
      🌿 NORMAL WIGGLE (your default feel)
    ========================= */
    @keyframes wiggle {
      0% {
        transform: perspective(600px) rotateY(-10deg) skewY(-12deg) rotateZ(-4deg);
      }
      50% {
        transform: perspective(600px) rotateY(-10deg) skewY(-12deg) rotateZ(-5deg);
      }
      100% {
        transform: perspective(600px) rotateY(-10deg) skewY(-12deg) rotateZ(-4deg);
      }
    }

    /* =========================
      ⚡ FAST WIGGLE (slightly stronger but controlled)
    ========================= */
    @keyframes wiggleFast {
      0% {
        transform: perspective(600px) rotateY(-10deg) skewY(-12deg) rotateZ(-4deg);
      }
      25% {
        transform: perspective(600px) rotateY(-10deg) skewY(-12deg) rotateZ(-5.2deg);
      }
      50% {
        transform: perspective(600px) rotateY(-10deg) skewY(-12deg) rotateZ(-3.8deg);
      }
      75% {
        transform: perspective(600px) rotateY(-10deg) skewY(-12deg) rotateZ(-5deg);
      }
      100% {
        transform: perspective(600px) rotateY(-10deg) skewY(-12deg) rotateZ(-4deg);
      }
    }

    /* =========================
      🌿 HOVER POLISH
    ========================= */

    #search:hover {
      filter: brightness(1.05);
    }

    #clock {
      font-family: "LeafFont", monospace;

      font-size: 2.5vw;
      color: #7ba569;

      padding: 6px 10px;

      backdrop-filter: blur(0px);

      text-shadow: 0 1px 0 rgba(0,0,0,0.6);

      user-select: none;

      line-height: 1.3;
      text-align: right;
    }

    /* #weather {
      font-family: "LeafFont", monospace;
      color: #7ba569;

      padding: 6px 10px;

      background: rgba(0, 0, 0, 0.2);
      backdrop-filter: blur(2px);

      border-radius: 8px;

      text-shadow: 0 1px 0 rgba(0,0,0,0.6);

      user-select: none;

      line-height: 1.3;
      font-size: 14px;
    }

    #temp {
      font-size: 20px;
      font-weight: bold;
    }

    #condition {
      font-size: 14px;
      opacity: 0.9;
    }

    #extra {
      font-size: 12px;
      opacity: 0.7;
    } */
     /* #forecast {
      position: fixed;
      top: 10px;
      left: 10px;

      display: flex;
      flex-direction: column;
      gap: 6px;

      z-index: 9999;

      font-family: "LeafFont", monospace;
      color: #7ba569;

      padding: 6px 8px;
      border-radius: 10px;

      background: rgba(0, 0, 0, 0.2);
      backdrop-filter: blur(2px);

      text-shadow: 0 1px 0 rgba(0,0,0,0.6);

      user-select: none;
    } */

    .weather-plank {
      width: 220px;
      height: 60px;

      background: url("icons/wood-texture.png");
      background-size: cover;

      border: 2px solid #2a2b1f;

      display: flex;
      align-items: center;
      justify-content: center;

      font-family: "PixelFont";
      color: #edd8ac;

      text-shadow: 0 1px 0 rgba(0,0,0,0.5);

      margin-bottom: 8px;

      opacity: 0;
      transform: translateY(-10px);
      animation: dropIn 0.4s ease forwards;
    }

    .weather-plank:nth-child(1) { animation-delay: 0.05s; }
    .weather-plank:nth-child(2) { animation-delay: 0.10s; }
    .weather-plank:nth-child(3) { animation-delay: 0.15s; }
    .weather-plank:nth-child(4) { animation-delay: 0.20s; }
    .weather-plank:nth-child(5) { animation-delay: 0.25s; }
    .weather-plank:nth-child(6) { animation-delay: 0.30s; }
    .weather-plank:nth-child(7) { animation-delay: 0.35s; }

    @keyframes dropIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .temp-color {
      font-weight: 600;

      /* fallback base color */
      color: #c8b08a;

      /* layered gradient system */
      background:
        /* 🌡️ temperature influence (origin bottom-right) */
        linear-gradient(
          340deg,

          var(--temp-color, #ff6b6b) 0%,

          var(--temp-color, #ff6b6b) calc(var(--split, 50%) - 10%),

          rgba(200, 176, 138, 0) var(--split, 50%)
        ),

        /* 🪵 wood base */
        linear-gradient(
          160deg,
          #c8b08a 0%,
          #c8a976 100%
        );

      /* required for text gradient rendering */
      -webkit-background-clip: text;
      background-clip: text;

      -webkit-text-fill-color: transparent;

      /* subtle depth so it doesn't feel flat */
      text-shadow: 0 1px 0 rgba(0, 0, 0, 0.25);
    }
  </style>
</head>

<body>

  <!-- VIDEO BACKGROUND -->
  <video autoplay muted loop id="bg-video">
    <source src="wallpaper.mp4" type="video/mp4">
  </video>

  <!-- TOP DOCK -->
  <div id="top-dock">
    <div id="dock-left">
      <div id="forecast"></div>
      <!-- <div id="weather">
        <div id="temp">--°F</div>
        <div id="condition">Loading...</div>
        <div id="extra">Humidity: --%</div>
      </div> -->
    </div>

    <div id="app-dock"></div>

    <div id="dock-right">
      <img src="icons/settings.png" id="settings-btn">
      <div id="clock"></div>
    </div>
  </div>

  <div id="search-container">
    <input id="search" placeholder="Searching the World of Pokémon!" />
  </div>

  <!-- SCRIPT -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
  <script src="newtab.js"></script>

</body>
