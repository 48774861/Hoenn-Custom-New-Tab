<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Littleroot Town</title>
  <link rel="icon" type="image/png" href="icons/may_bike.png">

  <style>
    /* =========================
      🌍 BASE LAYOUT
    ========================= */

    html, body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: black;
    }

    /* =========================
      🎥 VIDEO BACKGROUND
    ========================= */

    #bg-video {
      position: fixed;
      top: 50%;
      left: 50%;
      min-width: 100%;
      min-height: 100%;
      transform: translate(-50%, -50%);
      object-fit: cover;
    }

    /* =========================
      🧭 TOP DOCK LAYOUT
    ========================= */

    #top-dock {
      position: fixed;
      top: 10px;
      left: 0;
      right: 0;
      z-index: 9999;

      display: flex;
      align-items: center;
    }

    #dock-left {
      flex: 1;
    }

    #dock-right {
      flex: 1;
      display: flex;
      justify-content: flex-end;
      padding-right: 10px;
    }

    /* =========================
      📌 BOOKMARK BAR
    ========================= */

    #app-dock {
      display: flex;
      align-items: center;
      gap: 8px;

      padding: 6px 8px;
      border-radius: 10px;

      pointer-events: auto;

      background: rgba(0, 40, 20, 0.08);
      backdrop-filter: blur(1px);

      border: 1px solid rgba(255, 255, 255, 0.04);
    }

    #app-dock img {
      width: 26px;
      height: 26px;
      cursor: pointer;

      transition: transform 0.15s ease, filter 0.2s ease, opacity 0.2s ease;

      filter: brightness(0.55) saturate(0.4) sepia(0.6) hue-rotate(90deg);
      opacity: 0.85;
    }

    #app-dock img:hover {
      filter: none;
      opacity: 1;
      transform: scale(1.15);
    }

    /* =========================
      ⚙️ SETTINGS BUTTON
    ========================= */

    #settings-btn {
      width: 20px;
      height: 20px;
      cursor: pointer;
      transition: transform 0.15s ease;
    }

    #settings-btn:hover {
      transform: scale(1.15);
    }

    /* =========================
      🔍 SEARCH POSITION
    ========================= */

    #search-container {
      position: fixed;
      top: 50%;
      left: 49%;
      transform: translate(-50%, -50%);
      z-index: 9999;
    }

    /* =========================
      🪵 WOODEN SIGN SEARCH BAR
      (3D WORLD SPACE OBJECT)
    ========================= */

    @font-face {
      font-family: "PixelFont";
      src: url("fonts/Realwood-Regular.otf") format("truetype");
    }

    #search {
      width: 450px;
      height: 38px;

      padding: 8px 12px;

      font-family: "PixelFont", monospace;
      font-size: 18px;
      text-align: center;

      color: #edd8ac;

      background: url("icons/wood-texture.png");
      background-size: cover;

      border: 3px solid #292b1f;
      border-radius: 0;

      outline: none;

      box-shadow:
        inset 0 2px 4px rgba(0,0,0,0.35),
        0 4px 10px rgba(0,0,0,0.4);

      text-shadow:
        0 1px 0 rgba(0, 0, 0, 0.5),
        0 -1px 0 rgba(255, 255, 255, 0.1);

      /* 🌲 BASE 3D SIGN POSITION */
      transform: perspective(600px) rotateY(-10deg) skewY(-12deg);
      transform-origin: center;
    }

    /* =========================
      ✏️ PLACEHOLDER TEXT
    ========================= */

    #search::placeholder {
      color: rgba(230, 211, 179, 0.6);
      text-align: center;
    }

    /* =========================
      🌬️ WIGGLE ANIMATION
      (ALIGNED TO 3D SIGN)
    ========================= */

    /* =========================
      🌬️ SOFT WIGGLE (barely moving)
    ========================= */
    @keyframes wiggleSoft {
      0% {
        transform: perspective(600px) rotateY(-10deg) skewY(-12deg) rotateZ(-3.8deg);
      }
      50% {
        transform: perspective(600px) rotateY(-10deg) skewY(-12deg) rotateZ(-4.2deg);
      }
      100% {
        transform: perspective(600px) rotateY(-10deg) skewY(-12deg) rotateZ(-3.8deg);
      }
    }

    /* =========================
      🌿 NORMAL WIGGLE (your default feel)
    ========================= */
    @keyframes wiggle {
      0% {
        transform: perspective(600px) rotateY(-10deg) skewY(-12deg) rotateZ(-4deg);
      }
      50% {
        transform: perspective(600px) rotateY(-10deg) skewY(-12deg) rotateZ(-5deg);
      }
      100% {
        transform: perspective(600px) rotateY(-10deg) skewY(-12deg) rotateZ(-4deg);
      }
    }

    /* =========================
      ⚡ FAST WIGGLE (slightly stronger but controlled)
    ========================= */
    @keyframes wiggleFast {
      0% {
        transform: perspective(600px) rotateY(-10deg) skewY(-12deg) rotateZ(-4deg);
      }
      25% {
        transform: perspective(600px) rotateY(-10deg) skewY(-12deg) rotateZ(-5.2deg);
      }
      50% {
        transform: perspective(600px) rotateY(-10deg) skewY(-12deg) rotateZ(-3.8deg);
      }
      75% {
        transform: perspective(600px) rotateY(-10deg) skewY(-12deg) rotateZ(-5deg);
      }
      100% {
        transform: perspective(600px) rotateY(-10deg) skewY(-12deg) rotateZ(-4deg);
      }
    }

    /* =========================
      🌿 HOVER POLISH
    ========================= */

    #search:hover {
      filter: brightness(1.05);
    }
  </style>
</head>

<body>

  <!-- VIDEO BACKGROUND -->
  <video autoplay muted loop id="bg-video">
    <source src="wallpaper.mp4" type="video/mp4">
  </video>

  <!-- TOP DOCK -->
  <div id="top-dock">
    <div id="dock-left"></div>

    <div id="app-dock"></div>

    <div id="dock-right">
      <img src="icons/settings.png" id="settings-btn">
    </div>
  </div>

  <div id="search-container">
    <input id="search" placeholder="Searching the World of Pokémon!" />
  </div>

  <!-- SCRIPT -->
  <script src="newtab.js"></script>

</body>
</html>
