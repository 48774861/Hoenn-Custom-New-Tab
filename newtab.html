<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Littleroot Town</title>
  <link rel="icon" type="image/png" href="icons/may_bike.png">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: black;
    }

    /* VIDEO BACKGROUND */
    #bg-video {
      position: fixed;
      top: 50%;
      left: 50%;
      min-width: 100%;
      min-height: 100%;
      transform: translate(-50%, -50%);
      object-fit: cover;
    }

    /* TOP RIGHT DOCK */
    #top-dock {
      position: fixed;
      top: 10px;
      right: 10px;
      z-index: 9999;

      display: flex;
      align-items: center;
      gap: 10px;
    }

    #app-dock {
      display: flex;
      align-items: center;
      gap: 8px;

      background: rgba(0,0,0,0.25);
      backdrop-filter: blur(10px);
      padding: 6px 8px;
      border-radius: 10px;
    }

    #app-dock img,
    #settings-btn {
      width: 26px;
      height: 26px;
      cursor: pointer;
      transition: transform 0.15s ease;
    }

    #app-dock img:hover,
    #settings-btn:hover {
      transform: scale(1.15);
    }
  </style>
</head>

<body>

  <!-- VIDEO BACKGROUND -->
  <video autoplay muted loop id="bg-video">
    <source src="wallpaper.mp4" type="video/mp4">
  </video>

  <!-- TOP DOCK -->
  <div id="top-dock">
    <div id="app-dock"></div>
    <img src="icons/settings.png" id="settings-btn">
  </div>

  <!-- SCRIPT -->
  <script src="newtab.js"></script>

</body>
</html>
